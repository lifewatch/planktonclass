name: Integration

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      depth:
        description: "How deep should the manual integration run go?"
        required: true
        default: full
        type: choice
        options:
          - basic
          - training
          - full
      run_pretrained:
        description: "Also test the pretrained model download command"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  quick-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      PROJECT_DIR: ci_demo_project

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e .

      - name: Run path sanity checks
        run: python tests/integration/path_sanity_check.py

      - name: Initialize demo project
        run: python -m planktonclass.cli init "$PROJECT_DIR" --demo

      - name: Validate config
        run: python -m planktonclass.cli validate-config --config "$PROJECT_DIR/config.yaml"

      - name: Copy notebooks
        run: python -m planktonclass.cli notebooks "$PROJECT_DIR"

      - name: Run quick demo training
        run: python -m planktonclass.cli train --config "$PROJECT_DIR/config.yaml" --quick --workers 1

      - name: Resolve latest model timestamp
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          models_dir = Path(os.environ["PROJECT_DIR"]) / "models"
          timestamp_pattern = re.compile(r"^\d{4}-\d{2}-\d{2}_\d{6}$")
          timestamps = sorted(
              path.name
              for path in models_dir.iterdir()
              if path.is_dir() and timestamp_pattern.match(path.name)
          )
          if not timestamps:
              available = sorted(path.name for path in models_dir.iterdir() if path.is_dir())
              raise SystemExit(
                  "No timestamped model runs found after training. "
                  f"Available model directories: {available}"
              )

          latest = timestamps[-1]
          ckpts_dir = models_dir / latest / "ckpts"
          if (ckpts_dir / "best_model.keras").exists():
              ckpt_name = "best_model.keras"
          elif (ckpts_dir / "final_model.keras").exists():
              ckpt_name = "final_model.keras"
          else:
              raise SystemExit(f"No supported checkpoint found in {ckpts_dir}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"MODEL_TIMESTAMP={latest}\n")
              handle.write(f"MODEL_CKPT={ckpt_name}\n")
          PY

      - name: List models
        run: python -m planktonclass.cli list-models --config "$PROJECT_DIR/config.yaml"

      - name: Verify training artifacts
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          project_dir = Path(os.environ["PROJECT_DIR"])
          model_dir = project_dir / "models" / os.environ["MODEL_TIMESTAMP"]

          expected_paths = [
              model_dir / "ckpts" / os.environ["MODEL_CKPT"],
              model_dir / "conf" / "conf.json",
              model_dir / "logs" / "training.log",
              model_dir / "stats" / "stats.json",
              model_dir / "predictions",
              project_dir / "notebooks",
          ]
          missing = [str(path) for path in expected_paths if not path.exists()]
          if missing:
              raise SystemExit("Missing expected artifacts:\n" + "\n".join(missing))

          stats_path = model_dir / "stats" / "stats.json"
          with open(stats_path, encoding="utf-8") as handle:
              stats = json.load(handle)
          if "timestamp" not in stats:
              raise SystemExit(f"Expected timestamp in {stats_path}")
          PY

  full-integration:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      PROJECT_DIR: ci_demo_project
      API_PORT: "5005"
      DOCKER_API_PORT: "5006"
      DOCKER_IMAGE_TAG: "planktonclass-integration:latest"
      DOCKER_CONTAINER_NAME: "planktonclass-integration-test"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install -e .

      - name: Run path sanity checks
        run: python tests/integration/path_sanity_check.py

      - name: Initialize demo project
        run: python -m planktonclass.cli init "$PROJECT_DIR" --demo

      - name: Validate config
        run: python -m planktonclass.cli validate-config --config "$PROJECT_DIR/config.yaml"

      - name: Copy notebooks
        run: python -m planktonclass.cli notebooks "$PROJECT_DIR"

      - name: Optionally download pretrained model
        if: ${{ inputs.run_pretrained }}
        run: python -m planktonclass.cli pretrained "$PROJECT_DIR"

      - name: Run quick demo training
        if: ${{ inputs.depth == 'training' || inputs.depth == 'full' }}
        run: python -m planktonclass.cli train --config "$PROJECT_DIR/config.yaml" --quick --workers 1

      - name: Resolve latest model timestamp
        if: ${{ inputs.depth == 'training' || inputs.depth == 'full' }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          models_dir = Path(os.environ["PROJECT_DIR"]) / "models"
          timestamp_pattern = re.compile(r"^\d{4}-\d{2}-\d{2}_\d{6}$")
          timestamps = sorted(
              path.name
              for path in models_dir.iterdir()
              if path.is_dir() and timestamp_pattern.match(path.name)
          )
          if not timestamps:
              available = sorted(path.name for path in models_dir.iterdir() if path.is_dir())
              raise SystemExit(
                  "No timestamped model runs found after training. "
                  f"Available model directories: {available}"
              )

          latest = timestamps[-1]
          ckpts_dir = models_dir / latest / "ckpts"
          if (ckpts_dir / "best_model.keras").exists():
              ckpt_name = "best_model.keras"
          elif (ckpts_dir / "final_model.keras").exists():
              ckpt_name = "final_model.keras"
          else:
              raise SystemExit(f"No supported checkpoint found in {ckpts_dir}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as handle:
              handle.write(f"MODEL_TIMESTAMP={latest}\n")
              handle.write(f"MODEL_CKPT={ckpt_name}\n")
          PY

      - name: List models
        if: ${{ inputs.depth == 'training' || inputs.depth == 'full' }}
        run: python -m planktonclass.cli list-models --config "$PROJECT_DIR/config.yaml"

      - name: Generate quick report
        if: ${{ inputs.depth == 'full' }}
        run: python -m planktonclass.cli report --config "$PROJECT_DIR/config.yaml" --timestamp "$MODEL_TIMESTAMP" --mode quick

      - name: Build inference Docker image
        if: ${{ inputs.depth == 'full' }}
        run: python -m planktonclass.cli docker "$PROJECT_DIR" --timestamp "$MODEL_TIMESTAMP" --ckpt-name "$MODEL_CKPT" --tag "$DOCKER_IMAGE_TAG"

      - name: Verify training artifacts
        if: ${{ inputs.depth == 'training' || inputs.depth == 'full' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          project_dir = Path(os.environ["PROJECT_DIR"])
          model_dir = project_dir / "models" / os.environ["MODEL_TIMESTAMP"]

          expected_paths = [
              model_dir / "ckpts" / os.environ["MODEL_CKPT"],
              model_dir / "conf" / "conf.json",
              model_dir / "logs" / "training.log",
              model_dir / "stats" / "stats.json",
              model_dir / "predictions",
              model_dir / "results",
              project_dir / "notebooks",
          ]
          missing = [str(path) for path in expected_paths if not path.exists()]
          if missing:
              raise SystemExit("Missing expected artifacts:\n" + "\n".join(missing))

          stats_path = model_dir / "stats" / "stats.json"
          with open(stats_path, encoding="utf-8") as handle:
              stats = json.load(handle)
          if "timestamp" not in stats:
              raise SystemExit(f"Expected timestamp in {stats_path}")
          PY

      - name: Run in-process prediction smoke check
        if: ${{ inputs.depth == 'full' }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from deepaas.model.v2.wrapper import UploadedFile

          from planktonclass import api, config, paths

          project_dir = Path(os.environ["PROJECT_DIR"])
          config_path = project_dir / "config.yaml"
          config.set_config_path(str(config_path.resolve()))
          paths.CONF = config.get_conf_dict()

          image_path = next(project_dir.joinpath("data", "images").rglob("*.jpg"))
          uploaded = UploadedFile(
              name="data",
              filename=str(image_path.resolve()),
              content_type="image/jpeg",
              original_filename=image_path.name,
          )

          result = api.predict(
              image=uploaded,
              timestamp=os.environ["MODEL_TIMESTAMP"],
              ckpt_name=os.environ["MODEL_CKPT"],
          )
          if result.get("status") != "OK":
              raise SystemExit(f"Prediction failed: {result}")
          predictions = result.get("predictions", {})
          if not predictions.get("filenames"):
              raise SystemExit(f"Prediction payload missing filenames: {predictions}")
          PY

      - name: Start API server
        if: ${{ inputs.depth == 'full' }}
        run: |
          python -m planktonclass.cli api --config "$PROJECT_DIR/config.yaml" --host 127.0.0.1 --port "$API_PORT" > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API server
        if: ${{ inputs.depth == 'full' }}
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.request

          port = os.environ["API_PORT"]
          url = f"http://127.0.0.1:{port}/swagger.json"
          deadline = time.time() + 180
          last_error = None

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"API responded at {url}")
                          raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(5)

          raise SystemExit(f"API did not become ready: {last_error}")
          PY

      - name: Stop API server
        if: ${{ always() && inputs.depth == 'full' }}
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi

      - name: Start Dockerized API server
        if: ${{ inputs.depth == 'full' }}
        run: |
          docker rm -f "$DOCKER_CONTAINER_NAME" || true
          docker run -d -p "$DOCKER_API_PORT:5000" --name "$DOCKER_CONTAINER_NAME" "$DOCKER_IMAGE_TAG"

      - name: Wait for Dockerized API server
        if: ${{ inputs.depth == 'full' }}
        run: |
          python - <<'PY'
          import os
          import time
          import urllib.request

          port = os.environ["DOCKER_API_PORT"]
          url = f"http://127.0.0.1:{port}/swagger.json"
          deadline = time.time() + 180
          last_error = None

          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=10) as response:
                      if response.status == 200:
                          print(f"Dockerized API responded at {url}")
                          raise SystemExit(0)
              except Exception as exc:
                  last_error = exc
                  time.sleep(5)

          raise SystemExit(f"Dockerized API did not become ready: {last_error}")
          PY

      - name: Run Dockerized prediction smoke check
        if: ${{ inputs.depth == 'full' }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          import requests

          project_dir = Path(os.environ["PROJECT_DIR"])
          image_path = next(project_dir.joinpath("data", "images").rglob("*.jpg"))
          base_url = f"http://127.0.0.1:{os.environ['DOCKER_API_PORT']}"
          predict_url = f"{base_url}/v2/models/planktonclass/predict/"

          with image_path.open("rb") as handle:
              response = requests.post(
                  predict_url,
                  files={"image": (image_path.name, handle, "image/jpeg")},
                  timeout=(10, 240),
              )

          response.raise_for_status()
          payload = response.json()
          if payload.get("status") != "OK":
              raise SystemExit(f"Dockerized prediction failed: {payload}")

          predictions = payload.get("predictions", {})
          if not predictions.get("filenames"):
              raise SystemExit(f"Dockerized prediction payload missing filenames: {predictions}")
          PY

      - name: Stop Dockerized API server
        if: ${{ always() && inputs.depth == 'full' }}
        run: |
          docker rm -f "$DOCKER_CONTAINER_NAME" || true

      - name: Upload API log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-api-log
          path: api.log

      - name: Upload Docker logs on failure
        if: ${{ failure() && inputs.depth == 'full' }}
        run: docker logs "$DOCKER_CONTAINER_NAME" > docker-api.log || true

      - name: Upload Docker API log on failure
        if: ${{ failure() && inputs.depth == 'full' }}
        uses: actions/upload-artifact@v4
        with:
          name: integration-docker-api-log
          path: docker-api.log
